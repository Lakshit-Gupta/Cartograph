# Marked_Path / Cartograph — spare-machine sidecar compose file.
#
# Runs two camoufox-based services on the spare Pop OS 24.04 desktop
# (user remote_lakshit_gupta, same WiFi as the Pi, LAN-reachable but
# the Pi -> spare path is NEVER used — only spare -> Pi via autossh):
#
#   1. camoufox-worker-spare       — joins g:crawlers on stream:fetch.
#                                     Off-load Pi browser crawls.
#   2. apply-browser-worker        — Phase 4 auto-apply. Consumes
#                                     stream:apply_browser, decrypts
#                                     Internshala cookies locally
#                                     (libsodium master key in env),
#                                     drives camoufox to click Easy
#                                     Apply, fills, screenshots, and
#                                     either submits or stops (dry_run).
#                                     Publishes results onto
#                                     stream:apply_browser_result.
#
# Both connect to Pi's Redis + Postgres via SSH tunnel terminating on
# the spare's localhost. Different egress IP from the Pi is the whole
# point — keeps Cloudflare + Internshala fingerprints off the burned
# Pi IP.
#
# Pre-reqs (see docs/runbooks/sidecar_setup.md for the full procedure):
#   1. Pi compose redis + postgres publish 127.0.0.1:6379 / 127.0.0.1:5432.
#   2. Pi has a `carto-tunnel` SSH user, port-forward-only, restricted
#      authorized_keys entry permitting exactly those two destinations.
#   3. Spare runs an autossh systemd unit holding the tunnel up.
#   4. `.env.sidecar` exists alongside this file with the minimal env
#      vars (POSTGRES_HOST=127.0.0.1 REDIS_HOST=127.0.0.1 + decrypted
#      secrets pasted from the Pi's SOPS). See .env.sidecar.example.
#
# Bring up:
#   docker compose -f compose.sidecar.yaml up -d --build
# Scale (only AFTER the queue.py byte-cap fix has shipped):
#   docker compose -f compose.sidecar.yaml up -d --scale camoufox-worker-spare=2

services:
  camoufox-worker-spare:
    build:
      context: .
      dockerfile: docker/camoufox.Dockerfile
    image: marked_path-camoufox-worker:latest
    restart: unless-stopped
    # Host networking so the container's 127.0.0.1 is the spare's loopback,
    # i.e. the tunnel endpoint. Alternative (extra_hosts: host-gateway)
    # adds a docker0 NAT hop, harder to attribute in Postgres logs, and
    # gives no isolation benefit here because the container has no
    # listening ports — nothing to firewall off.
    network_mode: host
    env_file:
      - .env.sidecar
    environment:
      WORKER_KIND: browser
    # 1.5g headroom — Pi caps at 1g because it co-hosts the whole stack on
    # 8 GB. Spare runs only camoufox, so Firefox renders get more rope.
    mem_limit: 1500m
    memswap_limit: 1500m
    # Firefox renderer uses /dev/shm extensively for IPC / shared memory
    # buffers (media decoding, GPU surface buffers, page rendering). The
    # docker default 64M /dev/shm hits ENOSPC on any non-trivial page,
    # surfacing as `[Errno 28] No space left on device` during page.goto
    # or page.set_input_files. 2g is the standard Chromium / Firefox
    # in-Docker setting.
    shm_size: '2gb'
    tmpfs:
      # /tmp tmpfs — base64 PDFs decode here; never hits persistent disk.
      - /tmp:size=512m
      # NOTE: /home/camoufox/.cache is INTENTIONALLY NOT tmpfs.
      # The camoufox image pre-fetches the Firefox binary into
      # /home/camoufox/.cache/camoufox during `docker build` via
      # `python -m camoufox fetch`. A tmpfs mount on that directory
      # shadows the baked binary + creates a root-owned 1777 empty
      # mount, producing `[Errno 13] Permission denied:
      # '/home/camoufox/.cache/camoufox'` when the camoufox python lib
      # tries to access its own install. Letting the cache live in the
      # image's writable layer means firefox + xvfb come up clean on
      # every container start. Cache persists for the container's
      # lifetime; image rebuild refreshes it.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  apply-browser-worker:
    # Built natively on the spare (x86_64 Pop OS — no QEMU cross-compile).
    # Extends the camoufox image so Firefox + Xvfb + ghost-cursor are
    # already present; adds nothing but the new entrypoint module.
    build:
      context: .
      dockerfile: docker/apply_browser.Dockerfile
    image: marked_path-apply-browser:latest
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.sidecar
    environment:
      WORKER_KIND: apply_browser
    # Single replica — auto_apply.max_per_day default is 3. Scaling
    # beyond 1 would risk concurrent Internshala submits against the
    # same account, which trips their bot-detection cookie rotations.
    # Hard cap until the per-platform rate-limit story matures.
    mem_limit: 1500m
    memswap_limit: 1500m
    # Same /dev/shm bump as camoufox-worker-spare. Firefox renderer needs
    # 2GB+ shared memory; docker default 64M produces `[Errno 28] No
    # space left on device` during page navigation or file input set.
    shm_size: '2gb'
    tmpfs:
      # /tmp/apply is where the worker decodes base64 PDFs from
      # stream:apply_browser before handing to Playwright's set_input_files.
      # tmpfs (not bind mount) keeps PDFs off the spare's disk so a
      # forensic snapshot of the spare can't recover them post-submit.
      - /tmp:size=512m
      # NOTE: /home/camoufox/.cache INTENTIONALLY NOT tmpfs.
      # See the matching block on camoufox-worker-spare above — tmpfs
      # shadows the pre-fetched Firefox binary baked into the camoufox
      # image by `python -m camoufox fetch` during docker build,
      # producing `[Errno 13] Permission denied:
      # '/home/camoufox/.cache/camoufox'`. Cache lives in the image's
      # writable layer; persists for container lifetime; image rebuild
      # refreshes.
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
