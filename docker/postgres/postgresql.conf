# Marked_Path Postgres config — power-fail-safe (no UPS)
# Default values left commented for documentation; only divergent values uncommented.

listen_addresses = '*'
port = 5432
max_connections = 100

# Memory
shared_buffers = 512MB
effective_cache_size = 2GB
work_mem = 16MB
maintenance_work_mem = 128MB
huge_pages = try

# WAL / durability — DO NOT WEAKEN. Pi has no UPS.
synchronous_commit = on
full_page_writes = on
wal_compression = on
wal_level = replica
wal_buffers = 16MB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# WAL archiving → 5min RPO
archive_mode = on
archive_command = 'test ! -f /wal_archive/%f && cp %p /wal_archive/%f'
archive_timeout = 300

# Autovacuum
autovacuum = on
autovacuum_naptime = 5min
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 500
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on
log_temp_files = 1MB
log_line_prefix = '%t [%p]: db=%d,user=%u,app=%a,client=%h '

# Stats
track_activities = on
track_counts = on
track_io_timing = on
track_wal_io_timing = on

# Locale
datestyle = 'iso, mdy'
timezone = 'UTC'
default_text_search_config = 'pg_catalog.english'
