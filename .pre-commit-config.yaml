repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.20.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/getsops/sops
    rev: v3.9.1
    hooks:
      - id: sops-encryption-check
        name: ensure secrets.yaml stays encrypted
        entry: bash -c 'grep -q "sops:" secrets.yaml || (echo "secrets.yaml NOT encrypted!" && exit 1)'
        language: system
        files: ^secrets\.yaml$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        files: ^src/common/
        additional_dependencies:
          - pydantic>=2
          - pydantic-settings>=2
          - asyncpg-stubs

  - repo: local
    hooks:
      - id: migrate-replay
        name: replay migrations on ephemeral pgvector
        entry: scripts/validate_migrations.sh
        language: script
        files: ^migrations/V[0-9]+__.*\.sql$
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-smoke
        name: pytest smoke (fast, hermetic tests)
        entry: uv run pytest -m smoke --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
