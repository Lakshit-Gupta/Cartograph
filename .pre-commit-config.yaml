repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # secrets.yaml is SOPS-encrypted + mode 0600; touching it breaks
        # the cipher integrity and the file is read-only anyway.
        exclude: ^secrets\.yaml$
      - id: end-of-file-fixer
        exclude: ^secrets\.yaml$
      - id: check-yaml
        # SOPS-encrypted YAML has !secret tags PyYAML rejects.
        exclude: ^secrets\.yaml$
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Bumped from v0.6.9 → v0.15.12 to match the local venv. v0.6.9 didn't
    # know `RUF046` (added later) and InvalidRule'd the whole config.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.20.1
    hooks:
      - id: gitleaks

  # mypy hook removed for now. The mirrors-mypy environment didn't know
  # about the project's transitive dependencies (redis, pylatexenc, etc.)
  # and pre-existing src/common/* code has 5 legitimate but non-urgent
  # type-narrowing issues (Record indexing, yield variance). Fixing those
  # is a focused PR, not part of plan execution. mypy stays in the dev
  # dependency group; run manually with `uv run mypy src/common`.

  # All local hooks live in one block. The earlier sops-encryption-check
  # was declared under `repo: https://github.com/getsops/sops` which made
  # pre-commit try to fetch a .pre-commit-hooks.yaml from the SOPS repo
  # (it has none → InvalidManifestError). A bash check is a `local` hook.
  - repo: local
    hooks:
      - id: sops-encryption-check
        name: ensure secrets.yaml stays SOPS-encrypted
        entry: bash -c 'grep -q "sops:" secrets.yaml || { echo "secrets.yaml NOT encrypted!"; exit 1; }'
        language: system
        files: ^secrets\.yaml$
        pass_filenames: false
        stages: [pre-commit]

      - id: migrate-replay
        name: replay migrations on ephemeral pgvector
        entry: scripts/validate_migrations.sh
        language: script
        files: ^migrations/V[0-9]+__.*\.sql$
        pass_filenames: false
        stages: [pre-commit]

      - id: pytest-smoke
        name: pytest smoke (fast, hermetic tests)
        entry: uv run pytest -m smoke --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-commit]
