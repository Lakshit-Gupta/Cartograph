x-env-common: &env-common
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: ${postgres_user}
  POSTGRES_PASSWORD: ${postgres_password}
  POSTGRES_DB: ${postgres_db}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${redis_password}
  OPENROUTER_API_KEY: ${openrouter_api_key}
  OPENROUTER_MODEL_EXTRACTOR: ${openrouter_model_extractor}
  OPENROUTER_MODEL_RERANKER: ${openrouter_model_reranker}
  OPENROUTER_MODEL_CLASSIFIER: ${openrouter_model_classifier}
  OPENROUTER_MODEL_WRITER: ${openrouter_model_writer}
  RESEND_API_KEY: ${resend_api_key}
  RESEND_FROM_EMAIL: ${resend_from_email}
  DISCORD_BOT_TOKEN: ${discord_bot_token}
  DISCORD_GUILD_ID: ${discord_guild_id}
  TELEGRAM_API_ID: ${telegram_api_id}
  TELEGRAM_API_HASH: ${telegram_api_hash}
  TELEGRAM_SESSION_NAME: ${telegram_session_name:-Cartograph_freelance}
  TELEGRAM_SESSION_PATH: /var/lib/agent/telegram/${telegram_session_name:-Cartograph_freelance}.session
  REDDIT_CLIENT_ID: ${reddit_client_id}
  REDDIT_CLIENT_SECRET: ${reddit_client_secret}
  REDDIT_USER_AGENT: ${reddit_user_agent}
  GMAIL_OAUTH_CLIENT_ID: ${gmail_oauth_client_id}
  GMAIL_OAUTH_CLIENT_SECRET: ${gmail_oauth_client_secret}
  GMAIL_OAUTH_REFRESH_TOKEN: ${gmail_oauth_refresh_token}
  GMAIL_USER: ${gmail_user}
  GMAIL_WORKER_USER: ${gmail_worker_user}
  GMAIL_WORKER_APP_PASSWORD: ${gmail_worker_app_password}
  R2_ACCESS_KEY: ${r2_access_key}
  R2_SECRET_KEY: ${r2_secret_key}
  R2_BUCKET: ${r2_bucket}
  R2_ACCOUNT_ID: ${r2_account_id}
  LIBSODIUM_MASTER_KEY_HEX: ${libsodium_master_key_hex}
  COST_CAP_DAILY_USD: ${cost_cap_daily_usd}
  COST_CAP_DAILY_KILL_USD: ${cost_cap_daily_kill_usd}
  FLARESOLVERR_URL: ${flaresolverr_url}
  # Phase 2.3 follow-up automation — flag-gated rollout. When false the
  # daily 13:00 IST cron drafts nothing and the Send button refuses.
  MP_FOLLOWUP_ENABLED: ${mp_followup_enabled:-false}
  FOLLOWUP_WINDOW_DAYS: ${followup_window_days:-4}
  FOLLOWUP_DAILY_CAP: ${followup_daily_cap:-30}
  # Phase 3.2 dark-source discovery worker — flag-gated. When false the
  # weekly Sunday 04:00 IST cron returns immediately without LLM spend.
  # `dark_source_daily_llm_cap` caps classifier calls per run (default 50).
  MP_DARK_SOURCE_DISCOVERY_ENABLED: ${mp_dark_source_discovery_enabled:-false}
  DARK_SOURCE_DAILY_LLM_CAP: ${dark_source_daily_llm_cap:-50}
  PYTHONUNBUFFERED: "1"
  TZ: ${TZ:-Asia/Kolkata}

x-restart-policy: &restart-policy
  restart: unless-stopped

x-jobs-bot-image: &jobs-bot-image
  # Tag the shared image explicitly so docker/applier.Dockerfile can
  # `FROM marked_path-jobs-bot:latest`. Without the `image:` field
  # compose names the image after the service (marked_path-jobs-scheduler,
  # marked_path-crawler-worker, …) and there is no stable base to extend.
  image: marked_path-jobs-bot:latest
  build:
    context: .
    dockerfile: docker/jobs-bot.Dockerfile

services:
  postgres:
    image: pgvector/pgvector:pg16
    <<: *restart-policy
    environment:
      POSTGRES_USER: ${postgres_user}
      POSTGRES_PASSWORD: ${postgres_password}
      POSTGRES_DB: ${postgres_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - /mnt/storage/wal_archive:/wal_archive
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${postgres_user} -d ${postgres_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Loopback-only host port for SSH-tunneled remote workers (sidecar on
    # the spare Pop OS desktop). The spare reaches this through an
    # `ssh -L 127.0.0.1:5432:127.0.0.1:5432 carto-tunnel@<pi>` forward —
    # see docs/runbooks/sidecar_setup.md. NEVER widen to 0.0.0.0 / LAN IP:
    # the only network path in must remain SSH-authenticated port
    # forwarding from the restricted carto-tunnel user. The CLAUDE.md
    # "Docker network only" baseline holds for every other interface.
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    <<: *restart-policy
    command:
      - redis-server
      - --requirepass
      - ${redis_password}
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      # Pi runs 1gb after 2026-05-20 incident; dev sync. Per-stream byte caps
      # in src/common/queue.py keep steady-state at ~340MB worst case.
      - 1gb
      - --maxmemory-policy
      - noeviction
      - --rename-command
      - FLUSHALL
      - ""
      - --rename-command
      - CONFIG
      - ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Loopback-only host port for SSH-tunneled remote workers. Same threat
    # model as postgres above — only `ssh -L 127.0.0.1:6379:127.0.0.1:6379
    # carto-tunnel@<pi>` from the spare reaches this. requirepass +
    # rename-command CONFIG/FLUSHALL still hold; the new port is a
    # loopback rendezvous, not a network exposure.
    ports:
      - "127.0.0.1:6379:6379"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    <<: *restart-policy
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: ${TZ:-Asia/Kolkata}
    networks:
      - internal

  camoufox-worker:
    build:
      context: .
      dockerfile: docker/camoufox.Dockerfile
    <<: *restart-policy
    environment:
      <<: *env-common
      WORKER_KIND: browser
    mem_limit: 1g
    memswap_limit: 1g
    tmpfs:
      - /tmp:size=512m
      - /home/camoufox/.cache:size=256m
    deploy:
      replicas: 3
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jobs-scheduler:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.scheduler"]
    environment: *env-common
    volumes:
      - /var/lib/agent/logs:/app/logs
      # Phase 4 v2 — host config/ bind so edits to prefs.yaml and
      # internshala_filters.yaml propagate without rebuilding the image.
      # Read-only so a runaway worker can't trample config. The COPY in
      # jobs-bot.Dockerfile is still there for self-contained image builds
      # / image registry pulls; the bind mount shadows it at runtime.
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  crawler-worker:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.crawler"]
    environment: *env-common
    deploy:
      replicas: 3
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  extractor-worker:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.extractor_worker"]
    environment: *env-common
    volumes:
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  applier-worker:
    # Dedicated image (docker/applier.Dockerfile) — extends jobs-bot with
    # tectonic / qpdf / exiftool. Sandboxed per CLAUDE.md hard rules:
    # cap_drop ALL, read_only rootfs, mem 512m, pids 64, user 1000.
    # /tmp is a 128M tmpfs so tectonic/qpdf scratch files don't need rw root.
    build:
      context: .
      dockerfile: docker/applier.Dockerfile
    <<: *restart-policy
    command: ["python", "-m", "src.workers.applier"]
    environment:
      <<: *env-common
      MP_RESUME_LATEX_ENABLED: ${mp_resume_latex_enabled:-false}
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
      # Named volume (not host bind) so docker initialises perms from the
      # image's /var/lib/agent/resume_artifacts directory which we create
      # with chown 1000:1000 in docker/applier.Dockerfile. A host bind
      # would inherit /var/lib/agent/resume_artifacts root:root perms and
      # break the read_only-rootfs + user 1000 sandbox.
      - resume_artifacts:/var/lib/agent/resume_artifacts
      - tectonic_cache:/var/lib/tectonic
    read_only: true
    tmpfs:
      - /tmp:size=128m
    cap_drop: ["ALL"]
    mem_limit: 512m
    pids_limit: 64
    user: "1000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Phase 4 auto-apply result drain — consumes stream:apply_browser_result
  # from the spare-machine sidecar (apply-browser-worker), UPDATEs the
  # applications row, rolls opp state back on failure, and publishes the
  # auto_applied / auto_apply_dry_run / auto_apply_failed notify kind for
  # the Discord bot to surface. Lightweight — single replica, base image.
  apply-result-worker:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.apply_result_worker"]
    environment: *env-common
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
    cap_drop: ["ALL"]
    mem_limit: 256m
    pids_limit: 64
    user: "1000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  identity-warmup:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.identity_warmup"]
    environment: *env-common
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  ranker-worker:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.ranker_worker"]
    environment: *env-common
    volumes:
      - models_cache:/app/.cache/models
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  notifier-discord:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.notifier_worker"]
    environment:
      <<: *env-common
      DISCORD_CHANNEL_DAILY_DIGEST:  ${discord_channel_daily_digest}
      DISCORD_CHANNEL_PRIORITY_PUSH: ${discord_channel_priority_push}
      DISCORD_CHANNEL_FULLTIME:      ${discord_channel_fulltime}
      DISCORD_CHANNEL_INTERNSHIPS:   ${discord_channel_internships}
      DISCORD_CHANNEL_FELLOWSHIPS:   ${discord_channel_fellowships}
      DISCORD_CHANNEL_FREELANCE:     ${discord_channel_freelance}
      DISCORD_CHANNEL_APPLIED:       ${discord_channel_applied}
      DISCORD_CHANNEL_RESPONSES:     ${discord_channel_responses}
      DISCORD_CHANNEL_INTERVIEWS:    ${discord_channel_interviews}
      DISCORD_CHANNEL_OFFERS:        ${discord_channel_offers}
      DISCORD_CHANNEL_ALERTS:        ${discord_channel_alerts}
      DISCORD_CHANNEL_COSTS:         ${discord_channel_costs}
      DISCORD_CHANNEL_SOURCE_HEALTH: ${discord_channel_source_health}
      DISCORD_CHANNEL_BOT_LOGS:      ${discord_channel_bot_logs}
    volumes:
      - ${obsidian_vault_path:-/mnt/storage/obsidian_vault}:/vault
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gmail-watcher:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.gmail_worker"]
    environment: *env-common
    volumes:
      - ./config:/app/config:ro
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  freelance-telegram-fetcher:
    # Long-running Telethon client. Subscribes to public freelance channels
    # listed in config/profile/prefs.yaml -> freelance.telegram_channels and
    # publishes parsed messages directly onto stream:rank (no crawler/extractor
    # round-trip — Telegram posts are already structured enough).
    #
    # Session is bind-mounted RW. Telethon's SQLiteSession runs DELETE +
    # INSERT against the .session SQLite at every connect to refresh
    # auth_key; a :ro mount hard-crashes the connect loop with "attempt
    # to write a readonly database". The session is per-tenant (uid 1000,
    # libsodium-equivalent secret), never user-edited, so RW is materially
    # safe. Phase 2: migrate to MemorySession hydrated from a SOPS blob
    # if SD-card write churn becomes a measurable metric.
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.telegram_fetcher"]
    environment: *env-common
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./var/telegram:/var/lib/agent/telegram:rw
      - ./config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m
    mem_limit: 256m
    pids_limit: 64
    user: "1000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  freelance-twitter-fetcher:
    # Phase 3.1 — Twitter/X founder-signal scraper. Polls a curated list of
    # Nitter mirrors (public Twitter front-ends without auth) for the
    # founder/recruiter handles in config/profile/prefs.yaml ->
    # freelance.twitter_handles, filters hiring-intent tweets, and publishes
    # matches onto stream:rank (same shape as freelance-telegram-fetcher).
    # No host network, no API keys, no PII. Sandbox parity with telegram
    # fetcher: read_only rootfs, mem 256m, pids 64, user 1000. Boots cleanly
    # with an empty handles list — logs `tw_no_handles_configured` and idles.
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.twitter_signal"]
    environment: *env-common
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m
    mem_limit: 256m
    pids_limit: 64
    user: "1000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cold-outreach-worker:
    # Phase 2.1 — opt-in cold-email lane. Defaults to cold_outreach_enabled=false
    # so the worker boots, schedules the daily cron at 04:30 UTC (10:00 IST),
    # and immediately short-circuits each tick until SOPS flips the flag.
    # Reuses the base jobs-bot image — no tectonic / qpdf needed for cold
    # emails (resume PDFs ride along on inbound `send_application` only).
    # cap_drop ALL + user 1000 match the applier sandbox; this worker
    # touches Resend + Apollo / Hunter + Postgres + Redis only.
    <<: [*jobs-bot-image, *restart-policy]
    command: ["python", "-m", "src.workers.cold_outreach"]
    environment:
      <<: *env-common
      COLD_OUTREACH_ENABLED: ${cold_outreach_enabled:-false}
      COLD_OUTREACH_DAILY_CAP: ${cold_outreach_daily_cap:-10}
      COLD_OUTREACH_WARMUP_START: ${cold_outreach_warmup_start:-5}
      COLD_OUTREACH_WARMUP_DAYS: ${cold_outreach_warmup_days:-5}
      APOLLO_API_KEY: ${apollo_api_key:-}
      HUNTER_API_KEY: ${hunter_api_key:-}
    volumes:
      - /var/lib/agent/logs:/app/logs
      - ./config:/app/config:ro
    cap_drop: ["ALL"]
    mem_limit: 256m
    pids_limit: 64
    user: "1000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-service:
    <<: [*jobs-bot-image, *restart-policy]
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "9090"]
    environment:
      <<: *env-common
      # Phase 5.2 — Docker-internal DNS name for PostgREST. The api-service
      # reverse-proxies /api/postgrest/* here. Never published to the host.
      POSTGREST_BASE_URL: http://postgrest:3000
    volumes:
      # Phase 5.2 — frontend dashboard bundle. Bind-mounted read-only so a
      # rogue PostgREST or proxy bug cannot rewrite shipped frontend assets.
      # If `./dashboard/index.html` is absent the api-service still boots —
      # see src/api/dashboard.py::mount_dashboard for the guard.
      - ./dashboard:/app/dashboard:ro
      - ./config:/app/config:ro
    networks:
      - internal
      - public
    depends_on:
      postgres:
        condition: service_healthy
    # Exposed only via cloudflared / tailscale; internal port 9090 stays on Docker network

  postgrest:
    # Phase 5.2 — read-only REST API on top of the `dash` schema (V019).
    # Tailscale-only: NO `ports:` mapping. Reached from api-service via
    # Docker DNS (`postgrest:3000`); browser traffic terminates at
    # api-service and is reverse-proxied via /api/postgrest/*.
    image: postgrest/postgrest:v12.0.2
    <<: *restart-policy
    environment:
      # `pgrst_anon` is a NOLOGIN role granted SELECT on dash.* only —
      # see V019. PostgREST connects as the same superuser the rest of
      # the stack uses (DSN below) and `SET ROLE pgrst_anon` before every
      # request via PGRST_DB_ANON_ROLE. The role can never escape `dash.`.
      # Keyword/value DSN form (libpq) — no URL-encoding required, so
      # passwords with `/`, `+`, `=` (typical base64 output from
      # `openssl rand -base64 32`) don't get mis-parsed as scheme
      # separators. URI form previously made libpq fall back to socket
      # auth → "could not look up local user ID 1000".
      PGRST_DB_URI: host=postgres port=5432 user=${postgres_user} password=${postgres_password} dbname=${postgres_db}
      PGRST_DB_SCHEMAS: dash
      PGRST_DB_ANON_ROLE: pgrst_anon
      PGRST_SERVER_PORT: "3000"
      # Empty JWT secret = JWT verification disabled. Acceptable for the
      # solo deployment because (a) the views hard-code user_id=1, (b)
      # PostgREST is unreachable except via the Tailscale-bound api-service
      # proxy, (c) the role itself has SELECT-only on dash.* — no escape
      # surface. Multi-tenant cutover (Phase 4.2 sequel) flips this on.
      PGRST_JWT_SECRET: ""
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    # NO `ports:` — Tailscale-only via api-service proxy.

  tools:
    build:
      context: .
      dockerfile: docker/tools.Dockerfile
    environment: *env-common
    profiles: ["tools"]
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  models_cache:
  # tectonic font + package bundle. Pre-warmed inside applier.Dockerfile so
  # cold compiles stay under ~2s. Volume survives image rebuilds.
  tectonic_cache:
  # Tailored / fallback resume PDFs. Named volume (not host bind) so docker
  # inherits the image's chown-1000:1000 perms on /var/lib/agent/resume_artifacts
  # — works under the applier-worker's cap_drop:ALL + read_only-rootfs sandbox.
  resume_artifacts:

networks:
  internal:
    driver: bridge
    internal: false  # needs egress for OpenRouter/Discord/Resend; restricted via cloudflared ACLs
  public:
    driver: bridge
