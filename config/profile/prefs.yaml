# Geographic + lane preferences.
geo:
  prefer_remote: true
  prefer_countries: ["India","Remote","United States","Singapore","United Kingdom","Germany","Canada"]
  block_countries: []
  willing_to_relocate: ["Bangalore","Hyderabad","Pune","Mumbai","Delhi NCR","Remote"]
  timezone_overlap_hours_min: 4

lanes:
  enabled:
    - fulltime
    - internship
    - fellowship
    - freelance
  weights:                       # adjust per-lane ranker weight
    fulltime: 1.0
    internship: 1.0
    fellowship: 0.9
    freelance: 1.1               # speed lane = slight bias

quiet_hours:
  start: "23:00"
  end: "07:30"
  timezone: "Asia/Kolkata"

digest:
  daily_time: "08:00"
  daily_size: 10
  freelance_priority_threshold: 0.75   # opps above this score get #⚡-priority-push
  pin_companies: []                    # company names you always want surfaced

apply:
  daily_target: 5
  weekly_cap: 35
  default_method: "auto"               # auto = use opp.apply_method
  require_user_confirm_above_score: 0.90   # below this, ask before applying
  resume_variant_default: "backend"

# Phase 4 v2 auto-apply.
#
# Two-layer filter:
#   1. CRAWL-TIME — config/sources/internshala_filters.yaml generates
#      pre-filtered Internshala URLs (stipend ≥ N, work-mode, category,
#      location, keyword). 99% of irrelevant opps never enter the DB.
#   2. APPLY-TIME — this block. Defence in depth + per-opp policy gate.
#
# Default DISABLED; flip `enabled: true` only after the source is
# whitelisted via `UPDATE sources SET auto_apply_enabled=TRUE`.
auto_apply:
  enabled: false                 # master kill switch
  dry_run: true                  # sidecar fills modal + STOPS before Submit
  max_per_day: 3                 # hard ceiling per UTC date

  # SOFT SCORE — within filter survivors, score must be ≥ min_score.
  # Per-source overrides because score distributions differ wildly:
  # Internshala maxes at ~0.45 (no comp), ATS roles can hit 0.90.
  min_score: 0.30                # global floor
  per_source_min_score:
    in_internshala: 0.35         # observed 2026-05-29 p75=0.394
    ats_greenhouse: 0.75
    ats_lever:      0.70

  # HARD APPLY-TIME FILTERS — opp must satisfy ALL before scoring matters.
  # Most enforcement happens at crawl time (Internshala filter URLs); this
  # block catches stragglers + applies to non-Internshala sources too.
  filters:
    # INR floor. Cross-currency opps (USD freelance, GBP fellowships) are
    # normalized to INR via src/common/currency.py at score time and stored
    # in opportunities.comp_min_inr. NULL comp passes — many internships
    # advertise stipend in the description rather than a structured field.
    min_comp_inr_month: 30000
    # Max age (days since posted_at). Stale opps often already filled.
    max_age_days: 14

  # Apply methods the policy accepts. EMAIL = Resend send (existing path).
  # IN_PLATFORM = sidecar route (Internshala / future Naukri etc.).
  apply_methods_whitelist:
    - in_platform
    - email

  # Submitter keys allowed to fire. Each maps 1-to-1 with a registered
  # submitter in src/application/submitters/. Adding a key here without
  # a corresponding submitter module = `refused_no_submitter`.
  methods:
    - in_platform_internshala    # Phase 4.1 sidecar (ThinkPad)
    # Phase 4.2+ entries land here:
    # - in_platform_naukri
    # - in_platform_cuvette
    # - in_platform_unstop
    # - in_platform_contra
    # - ats_form_greenhouse
    # - ats_form_lever
    # - ats_form_ashby
    # - ats_form_workable

# Phase 4 — Internshala browser discovery (ThinkPad sidecar worker).
#
# Overrides the matching INTERNSHALA_* env vars in compose.sidecar.yaml WHEN
# present (prefs wins, so the operator can retune cadence by editing this
# checked-in file without touching .env.sidecar). Only these four keys are
# read; the rest of the worker config (selector / matrix paths, identity label)
# stays env-only. idle_sec is the testing cadence — raise to 1800 in prod once
# the remote pool is verified.
discovery:
  internshala:
    idle_sec: 180          # seconds between cycles (testing); raise to 1800 in prod
    comp_floor_inr: 30000  # per-month INR floor enforced on parsed card stipend
    max_age_days: 14       # drop cards past their "Apply By" date OR (no deadline) posted >N days ago
    max_cycles_per_engine: 10  # camoufox restart cadence (memory-drift mitigation)

  # Internshala full-time JOBS vertical (sibling worker; URL-path filtered).
  # Cities + min_salary_lpa_url + work_from_home shape the listing URL; the real
  # 12 LPA floor (strict comp_min) + the experience cap are enforced in code.
  internshala_jobs:
    cities: [bangalore, gurgaon, pune, uttar-pradesh, ghaziabad]
    min_salary_lpa_url: 10   # Internshala's max URL salary option; real floor is code-side
    work_from_home: true
    crawl_fresher: true      # crawl /fresher-jobs/...
    crawl_general: true      # crawl /jobs/... (both, deduped via Redis)
    salary_floor_lpa: 12     # strict comp_min floor → 100000 INR/month
    max_experience_years: 1  # keep jobs requiring <= 1 yr (user has ~6-9 months)
    max_age_days: 14
    idle_sec: 180
    max_cycles_per_engine: 10
    identity_label: raju_internshala

ranker:
  weights:
    kw_match: 0.25
    embedding_sim: 0.30
    comp_score: 0.15
    freshness: 0.10
    source_quality: 0.10
    response_rate: 0.10
  recency_half_life_hours: 36
  enable_llm_rerank: true
  llm_rerank_top_k: 30

routing:
  fulltime_channel_key: fulltime
  internship_channel_key: internships
  fellowship_channel_key: fellowships
  freelance_channel_key: freelance

freelance:
  # Public Telegram channels the freelance-telegram-fetcher worker subscribes
  # to. Accepts `@channelname`, `t.me/channelname`, or the bare slug. Empty
  # list = worker boots, logs `tg_no_channels_configured`, and idles. Append
  # entries here as you discover signal-rich freelance channels.
  telegram_channels: []

  # Phase 3.1 — Twitter/X founder-signal scraper. List founder / recruiter
  # handles you trust to surface hiring intent ("we're hiring", "looking for
  # a [role]", "paid project", "join us", "we need"). The worker polls each
  # handle via Nitter mirrors on a 30 min schedule and publishes matched
  # tweets onto stream:rank. Accepts `paulg`, `@paulg`, `twitter.com/paulg`,
  # or `https://x.com/paulg/`. Empty list = worker boots, logs
  # `tw_no_handles_configured`, and idles. Daily fetch budget is capped at
  # 10 polls per handle (240 total at 24 handles) to play nice with Nitter
  # operators.
  twitter_handles: []

# Phase 2.1 — cold-email outbound lane (Apollo/Hunter + LLM intro).
#
# This block is informational; the worker reads the actual flags from
# SOPS-encrypted secrets.yaml so they roll through `sops exec-env`
# verbatim. The hard caps live in src/common/secrets.py defaults
# (daily_cap=10, warmup_start=5, warmup_days=5) and only the SOPS file
# can override them at runtime. Keeping this stanza here documents the
# intent + lets `/explain outreach` slash commands surface user prefs.
outreach:
  enabled: false              # mirror of cold_outreach_enabled in SOPS
  daily_cap: 10               # hard ceiling per UTC day
  warmup_start: 5             # day-0 floor (ramps linearly to daily_cap)
  warmup_days: 5              # days to reach daily_cap
  target_role: "Engineering Manager"   # used as a hint when Apollo titles are sparse
  # Subject-line dedupe window. Subjects re-used inside this many days
  # are refused at write time by cap.py.
  subject_dedupe_days: 30
  recipient_dedupe_days: 14
