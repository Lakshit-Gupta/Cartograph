# Internshala JOBS field-relevance filter — SIGHUP-reloadable.
#
# Jobs have NO category dropdown; the URL returns EVERY role in those cities
# >= salary. The worker filters in code on the job TITLE:
#
#   keep iff  (title matches NO exclude term)  AND
#             (include_title_any empty  OR  title matches >= 1 include term)
#
# Word-boundary match, NEVER substring ("ml" never matches "html"; "go developer"
# is a phrase so bare "Go-getter" is safe). Exclude wins over include, so
# "Sales Engineer" / "Mechanical Engineer" are dropped despite matching "engineer".
#
# The shared config/policy/negative_keywords.yaml is ALSO merged into the exclude
# set (domain_mismatch / marketing / design / sales_ops / hr / finance), so
# `exclude_any` below only adds what that list misses (medical / teaching /
# legal / hospitality / banking-sales). Edit + `kill -HUP <worker pid>` to reload.
#
# TUNING: the include list is the net width. It deliberately leans broad —
# generic role words (developer/engineer/software/programmer) catch most tech
# roles, and the exclude list removes the off-field ones that happen to say
# "engineer". Add a term to widen; the exclude side keeps precision.
version: "2026.05.31.v2"

# Positive field filter — software / backend / data / ML / AI / DevOps roles.
include_title_any:
  # generic tech role words (catch most relevant titles)
  - developer
  - engineer
