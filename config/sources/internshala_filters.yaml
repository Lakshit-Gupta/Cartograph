# config/sources/internshala_filters.yaml
#
# Internshala URL-filter crawler config — refined 2026-05-29 via SEO
# Specialist agent recon. URL slugs treated as Internshala's internal
# ranking taxonomy; we crawl the slug paths that map cleanly to backend
# + ML personas and let the policy gate's negative-keyword filter
# (config/policy/negative_keywords.yaml) reject noise post-crawl.
#
# URL shapes:
#   /internships/<category>-internships/stipend-<N>
#   /internships/work-from-home-<category>-internships/stipend-<N>
#   /internships/<category>-internships-in-<city>/stipend-<N>
#   /internships/keyword-<word>/stipend-<N>
#
# Multi-word keyword slugs use hyphens (python-developer, nlp-engineer).
# Internshala accepts them literally — the URL generator MUST NOT
# urlencode the hyphens.
#
# Persona-scoped combinations: each block targets ONE intent slice.
# ~22 URLs/cycle × pages_per_url=3 = ~66 page fetches/cycle.
# Approx steady-state: bumped down from 30 URLs with broader coverage.

internshala:
  stipend_min_inr: 30000
  pages_per_url: 3

  # ────────────────────────────────────────────────────────────────
  # WORK MODES
  # ────────────────────────────────────────────────────────────────
  # part-time dropped — too noisy on Internshala (content/marketing
  # skew, sub-30k stipends). Default (no work-mode prefix) covers
  # on-site listings via the `[category, location]` block.
  work_modes:
    - work-from-home

  # ────────────────────────────────────────────────────────────────
  # CATEGORIES — Internshala slug taxonomy aligned to backend + ML
  # ────────────────────────────────────────────────────────────────
  # Pure-noise categories (marketing, content-writing, hr, sales, ops,
  # finance, civil/mechanical/electrical, graphic-design, video-editing,
  # social-media, ai-content-creator) are intentionally ABSENT.
  categories:
    # Backend / Python persona
    - backend-development
    - python-django-development     # django implies backend
    - software-development
    - full-stack-development
    - web-development               # noisy but unavoidable for FS roles
    - java-development              # IN market backend signal
    - node-js-development           # node/Express backend
    - devops
    - cloud-computing
    - database
    - api-development
    # Frontend kept ONLY for full-stack overlap
    - frontend-development
    - react-development             # high-signal vs generic frontend
    # ML / Data persona
    - machine-learning
    - data-science
    - data-analytics                # SQL-heavy, persona-aligned
    - artificial-intelligence
    - deep-learning                 # high intent, lower volume
    - computer-vision
    - natural-language-processing
    - data-engineering              # backend ∩ ML overlap
    # Adjacent technical (low-volume, high-intent)
    - blockchain-development        # IN startup signal; backend-flavored
    - cyber-security                # backend-flavored
    - product-management            # backend-heavy startups pay above floor

  # ────────────────────────────────────────────────────────────────
  # LOCATIONS — IN tech corridors
  # ────────────────────────────────────────────────────────────────
  # chennai (NEW): Zoho, Freshworks, Chargebee, Postman EU teams.
  # ahmedabad (NEW): growing IN SaaS hub.
  # kolkata intentionally OMITTED — low backend/ML internship volume
  # above 30k.
  # "remote" is handled via work_modes: [work-from-home], NOT as a slug.
  locations:
    - bangalore
    - hyderabad
    - pune
    - mumbai
    - delhi
    - gurgaon
    - noida
    - chennai
    - ahmedabad

  # ────────────────────────────────────────────────────────────────
  # KEYWORDS — long-tail SEO terms (free-form /keyword-<X>/)
  # ────────────────────────────────────────────────────────────────
  # Dropped from prior list:
  #   "ml"        — substring false-matches "html", "marketing"
  #   "backend"   — covered by backend-development category; keyword
  #                 search adds "backend operations" / "backend office"
  #   "tcs"       — Tata Consultancy posts mostly non-tech rotations
  #   "infosys"   — Infosys internships heavily ops/BPO
  #
  # Brand keywords listed below the technical block; existing crawler
  # treats them as a single keywords axis (Phase 2: split into a
  # brand_keywords axis with per-axis pages_per_url override).
  keywords:
    # — Backend persona, high-intent technical —
    - python-developer
    - django-developer
    - fastapi
    - flask
    - golang
    - rust-developer
    - postgresql
    - microservices
    - rest-api
    - graphql
    # — ML persona, high-intent technical —
    - pytorch
    - tensorflow
    - llm
    - generative-ai
    - transformers
    - nlp-engineer
    - computer-vision-engineer
    - mlops
    - data-engineer
    - applied-ai
    # — Cross-persona (DevOps / cloud) —
    - kubernetes
    - docker
    - aws
    - terraform
    # — Brand keywords: IN employers consistently posting backend/ML
    #   roles above ₹30k. Excluded brands historically heavy on
    #   sales/ops/content (Byju's, Unacademy ops, Paytm sales,
    #   Reliance, OYO).
    # Fintech (backend-heavy, well-paid)
    - razorpay
    - cred
    - zerodha
    - groww
    - phonepe
    - jupiter
    # Consumer tech (large backend / ML teams)
    - zomato
    - swiggy
    - flipkart
    - meesho
    - urban-company
    # Global tech with IN internship programs
    - microsoft
    - adobe
    - atlassian
    - postman
    - intuit
    - salesforce
    - oracle
    # Indian SaaS / dev-tools (high backend signal)
    - freshworks
    - zoho
    - chargebee
    - browserstack
    - hasura
    - rapido
    # AI / ML-first companies hiring interns in IN
    - sarvam-ai
    - krutrim
    - ola-krutrim
    - fractal-analytics

  # ────────────────────────────────────────────────────────────────
  # COMBINATIONS — persona-scoped, intent-targeted slices
  # ────────────────────────────────────────────────────────────────
  combinations:
    # Block 1: Backend persona, remote-first (~8 URLs)
    - axes: [work_mode, category]
      work_modes: [work-from-home]
      categories:
        - backend-development
        - python-django-development
        - full-stack-development
        - node-js-development
        - data-engineering
        - devops
        - api-development
        - software-development

    # Block 2: ML persona, remote-first (~6 URLs)
    - axes: [work_mode, category]
      work_modes: [work-from-home]
      categories:
        - machine-learning
        - data-science
        - artificial-intelligence
        - deep-learning
        - natural-language-processing
        - computer-vision

    # Block 3: Backend persona, top-3 IN cities on-site (~6 URLs)
    # On-site backend roles in BLR/HYD/PUN clear the stipend floor.
    - axes: [category, location]
      categories: [backend-development, full-stack-development]
      locations: [bangalore, hyderabad, pune]

    # Block 4: High-intent free-form keywords (no category lock)
    # Internshala's keyword index pulls cross-category matches we'd
    # miss otherwise (e.g. "Python Developer" miscategorized under
    # "software-testing"). Uses the full keywords: block including
    # brand keywords above.
    - axes: [keyword]
