# config/sources/internshala_filters.yaml
#
# Internshala URL-filter crawler config — RUTHLESS refit 2026-05-29.
#
# Prior (v2026-05-29 morning) was too permissive: civil / mechanical /
# content-creator opps still leaked into the candidate pool because
# (a) frontend + product-management + cyber-security categories drag in
#     adjacent-but-not-aligned roles, (b) generic 1-word keywords
#     ("python", "aws", "docker") match BPO/ops listings whose JDs
#     mention the tools in passing, (c) the keyword-only Block 4
#     produced URLs with no location/work-mode lock, so on-site civil-
#     engineering "Python data entry" listings leaked.
#
# New stance: lower volume, higher precision. Strict ₹30k+ enforced at
# URL level on EVERY block (Internshala honors /stipend-<N>/). Backend +
# Python + ML + Data Engineering ONLY. Everything else gone.
#
# URL shapes (unchanged from prior):
#   /internships/<category>-internships/stipend-<N>
#   /internships/work-from-home-<category>-internships/stipend-<N>
#   /internships/<category>-internships-in-<city>/stipend-<N>
#   /internships/work-from-home-keyword-<word>-internships/stipend-<N>
#
# Approx steady-state: ~18 URLs/cycle × pages_per_url=3 = ~54 fetches.

internshala:
  stipend_min_inr: 30000        # hard floor — never lowered. URL-enforced.
  pages_per_url: 3

  # ────────────────────────────────────────────────────────────────
  # WORK MODES
  # ────────────────────────────────────────────────────────────────
  # work-from-home only at the axis level. On-site is reintroduced
  # ONLY for the top-3 backend hubs via the [category, location] block
  # below — never as a free-form axis.
  work_modes:
    - work-from-home

  # ────────────────────────────────────────────────────────────────
  # CATEGORIES — backend + ML core ONLY
  # ────────────────────────────────────────────────────────────────
  # DROPPED (vs prior):
  #   web-development          — pulls WordPress / Shopify / HTML-only listings
  #   frontend-development     — frontend-only overlap too weak for persona
  #   react-development        — same; React listings without backend = skip
  #   product-management       — PM internships at non-tech IN startups
  #                              still slip through, pay below floor
  #   cyber-security           — low backend overlap; mostly SOC-analyst ops
  #   blockchain-development   — low volume + recurring crypto-scam noise
  #   data-analytics           — too many "MS Excel analyst" listings
  #   java-development         — IN java internships skew enterprise BPO/SI
  #   node-js-development      — covered via full-stack-development;
  #                              standalone node category is MERN-frontend-heavy
  #   cloud-computing          — sysadmin-flavored, low backend role density
  #   database                 — DBA-flavored, low intern volume above floor
  #   software-development     — too generic; pulls QA + manual testing
  categories:
    # Backend / Python persona
    - backend-development
    - python-django-development
    - full-stack-development        # kept — proxy for "real backend" full-stack
    - devops
    - api-development
    # ML / Data persona
    - machine-learning
    - data-science
    - artificial-intelligence
    - deep-learning
    - computer-vision
    - natural-language-processing
    - data-engineering

  # ────────────────────────────────────────────────────────────────
  # LOCATIONS — backend hubs only
  # ────────────────────────────────────────────────────────────────
  # Cut to top-3 IN backend cities for on-site Block. Mumbai/Delhi/
  # Gurgaon/Noida/Chennai/Ahmedabad dropped — backend intern density
  # above ₹30k is materially lower than BLR/HYD/PUN. Re-add later if
  # response-rate data justifies expansion.
  locations:
    - bangalore
    - hyderabad
    - pune

  # ────────────────────────────────────────────────────────────────
  # KEYWORDS — high-intent technical role keywords ONLY
  # ────────────────────────────────────────────────────────────────
  # DROPPED (vs prior):
  #   python, aws, docker, flask, kubernetes, llm, generative-ai,
  #   transformers, postgresql, microservices, rest-api, graphql,
  #   rust-developer, computer-vision-engineer, applied-ai, terraform
  # Rationale: every dropped term is 1-word or a tool name that
  # appears in JDs for civil/ops/data-entry "we use Excel and a bit
  # of Python" roles. Replaced with multi-word ROLE titles which
  # Internshala's keyword index treats as intent signals.
  keywords:
    # Backend persona — technical ROLE titles, not tool names
    - python-developer
    - django-developer
    - fastapi
    - golang
    # ML persona — technical ROLE titles
    - pytorch
    - tensorflow
    - mlops
    - data-engineer
    - nlp-engineer
    - machine-learning-engineer

  # ────────────────────────────────────────────────────────────────
  # BRAND KEYWORDS — IN dev-shops where backend/ML interns clear ₹30k+
  # ────────────────────────────────────────────────────────────────
  # DROPPED (vs prior):
  #   zomato / swiggy / flipkart / meesho — IS listings skew to non-tech
  #     ops + delivery + brand-marketing for these brands
  #   microsoft — mixed bag, lots of evangelism + community-manager roles
  #   salesforce / oracle / intuit — pay below their global standard on IS
  #   urban-company / rapido / freshworks / zoho / chargebee / jupiter —
  #     low recent backend-intern volume above floor; revisit Phase 2
  #   ola-krutrim — kept as `krutrim` only (canonical brand slug)
  brand_keywords:
    # Fintech (backend-heavy, well-paid)
    - razorpay
    - cred
    - zerodha
    - groww
    - phonepe
    # Dev-tools / SaaS (high backend signal)
    - postman
    - browserstack
    - hasura
    # Global with reliable IN backend internships
    - atlassian
    - adobe
    # AI/ML-first IN companies
    - sarvam-ai
    - krutrim
    - fractal-analytics

  # ────────────────────────────────────────────────────────────────
  # COMBINATIONS — every block URL-enforces ₹30k AND a constraint
  #                that locks out non-tech noise
  # ────────────────────────────────────────────────────────────────
  combinations:
    # Block 1: Backend persona, remote (~5 URLs)
    - axes: [work_mode, category]
      work_modes: [work-from-home]
      categories:
        - backend-development
        - python-django-development
        - full-stack-development
        - data-engineering
        - api-development

    # Block 2: DevOps persona, remote (~1 URL)
    - axes: [work_mode, category]
      work_modes: [work-from-home]
      categories:
        - devops

    # Block 3: ML persona, remote (~6 URLs)
    - axes: [work_mode, category]
      work_modes: [work-from-home]
      categories:
        - machine-learning
        - data-science
        - artificial-intelligence
        - deep-learning
        - natural-language-processing
        - computer-vision

    # Block 4: Backend persona, top-3 IN cities on-site (~6 URLs)
    # On-site backend roles in BLR/HYD/PUN reliably clear ₹30k.
    - axes: [category, location]
      categories: [backend-development, full-stack-development]
      locations: [bangalore, hyderabad, pune]

    # Block 5: High-intent technical-role keywords, REMOTE-LOCKED.
    # Prior config used `axes: [keyword]` which produced URLs with no
    # location / work-mode constraint — that's where civil-engineering
    # "needs Python" listings leaked in. `[work_mode, keyword]` forces
    # /work-from-home-keyword-<X>-internships/stipend-30000/ which
    # Internshala's index treats as remote-only.
    - axes: [work_mode, keyword]
      work_modes: [work-from-home]
      # keywords axis reads the top-level keywords: list (technical
      # roles only, brand_keywords kept separate to avoid 4-axis
      # cross-product blow-up)

    # Block 6: Brand keywords, REMOTE-LOCKED.
    # Same rationale — never crawl brand keywords without a work-mode
    # lock; otherwise we get on-site BD/sales internships at fintech
    # brands.
    - axes: [work_mode, brand_keyword]
      work_modes: [work-from-home]
      # brand_keyword axis reads brand_keywords: list above.

# ────────────────────────────────────────────────────────────────────
# previous_session_notes (2026-05-29)
# ────────────────────────────────────────────────────────────────────
# v1 (broad)        → too much noise, civil/mech/content leaked
# v2 (morning fix)  → still leaked: frontend/PM/cybersec categories +
#                     1-word keywords + unconstrained keyword block
# v3 (this file)    → ruthless cut. Backend + ML ONLY. All keyword
#                     blocks work-mode-locked. ~18 URLs/cycle.
# If response-rate data Phase 2 shows under-volume, the FIRST levers
# to relax are: re-add `data-analytics` category, re-add `chennai`
# location to Block 4. Do NOT re-add 1-word keywords.
